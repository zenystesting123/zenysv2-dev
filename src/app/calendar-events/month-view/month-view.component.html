<!----------------tool bar starts here----------------------->
<mat-toolbar style="
    flex: 0 0 64px;
    z-index: 10;
    text-align: center;
    justify-content: center;
    align-items: center;
  " class="border-bottom" [ngStyle]="{ 'background-color': 'white' }">
  <span class="example-spacer"></span>
  <button mat-icon-button n (click)="onDecrementMonth()" title="Previous">
    <mat-icon color="accent">keyboard_arrow_left</mat-icon>
  </button>
  <h2 class="text-uppercase">
    {{ googleCalendarEventService.selectedMonthfirstDate | date: "MMMM y" }}
  </h2>
  <button mat-icon-button (click)="onIncrementMonth()" title="Next">
    <mat-icon color="accent">keyboard_arrow_right</mat-icon>
  </button>
  &nbsp;&nbsp;&nbsp;&nbsp;
</mat-toolbar>
<!----------------tool bar ends here----------------------->
<!----------------checks if its month vew----------------------->
<div style="padding: 30px" *ngIf="googleCalendarEventService.monthVisible">
  <br />
  <!----------------divide 5 rows and 7 columns----------------------->
  <div class="row" *ngFor="let in of counter(5); let i = index" style="height: 150px">
    <div class="column border" *ngFor="let in of counterColumn(7); let k = index" style="
        width: 14.2%;
        height: 150px;
        padding-top: 10px;
        align-items: center;
        text-align: center;
      ">
      <p *ngIf="i == 0">{{ getDayString(k) }}</p>
      <div *ngIf="getDateString(i, k) != 0">{{ getDateString(i, k) }}</div>
      <mat-list role="list" *ngFor="let item of getTaskDate(getDateString(i, k)); let m = index" style="padding: 0px;">
        <mat-list-item *ngIf="1 >= m" role="listitem" style="
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 1; /* number of lines to show */
            -webkit-box-orient: vertical;
            white-space: nowrap;
            height: 30px;
            width: 100%;
          ">
          <a [routerLink]="['/dash/eventlist']" (click)="onViewDetails(item)">{{ item.start.dateTime | date: "shortTime"
            }} {{ item.summary }}</a>
        </mat-list-item>
      </mat-list>
      <div style="height: 30px; color: #000; font-weight: bold" *ngIf="eventLength >= 3">
        <button mat-button [matMenuTriggerFor]="menu" #menuTrigger>
          {{ moreEventLength }} More
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item style="height: auto">
            <mat-list role="list" *ngFor="
                let item of getTaskDate(getDateString(i, k));
                let m = index
              " style="padding: 0px">
              <mat-list-item *ngIf="m >= 2" role="listitem" (click)="onViewDetails(item)" style="
                  height: 30px;
                  overflow: hidden;
                  text-overflow: ellipsis;
                  display: -webkit-box;
                  -webkit-line-clamp: 1; /* number of lines to show */
                  -webkit-box-orient: vertical;
                  white-space: nowrap;
                ">
                <a [routerLink]="['/dash/eventlist']" (click)="onViewDetails(item)">{{ item.start.dateTime | date:
                  "shortTime" }}
                  {{ item.summary }}</a>
              </mat-list-item>
            </mat-list>
          </button>
        </mat-menu>
      </div>
    </div>
  </div>
</div>
