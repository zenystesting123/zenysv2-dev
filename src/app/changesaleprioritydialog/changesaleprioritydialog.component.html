<h1 mat-dialog-title>Update {{ fieldNameSale }} priority</h1>
<div mat-dialog-content>
  <p>Confirm updation of {{ fieldNameSale }} priority to {{ priority }}</p>
</div>
<div mat-dialog-actions style="float: right">
  <button mat-button (click)="onCancel()" cdkFocusInitial>Cancel</button>
  <button mat-button color="accent" (click)="onSubmit()">Update</button>
</div>
