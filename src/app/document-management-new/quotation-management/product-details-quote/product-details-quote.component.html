<mat-expansion-panel (opened)="updatePanleState(true)" (closed)="updatePanleState(false)"
    [expanded]="quotationService.productPanel">
    <mat-expansion-panel-header>
        <mat-panel-title> Item Details </mat-panel-title>
    </mat-expansion-panel-header>
    <app-billing-amount-details-quote [superUserDetails]="superUserDetails" [docData]="docData"></app-billing-amount-details-quote>
    <app-product-table-quote [itemLists]="itemLists"></app-product-table-quote>
    <app-product-summary-quote></app-product-summary-quote>
</mat-expansion-panel>
