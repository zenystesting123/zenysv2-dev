<div class="container-fluid"*ngIf="quotationService.isLoaded">
    <div class="container-xl">
        <br>
        <section id="basic-hidden-label-form-layouts">
            <div class="row match-height">
                <div class="col-lg-12 col-sm-12 col-md-12">
                    <form [formGroup]="form">
                        <mat-card>
                            <div class="card-body">
                                <!-- Document Title-->

                                <div class="row">
                                    <div class="col-md-6 col-lg-6 col-sm-12">
                                        <div>
                                            <div>
                                                <mat-form-field class="example-full-width">
                                                    <mat-label>Doc Title</mat-label>
                                                    <input matInput placeholder="Document Title" id="doc-title"
                                                    (keyup)="changeDocTitle()" 
                                                     name="docTitle"
                                                     formControlName="docTitle" />
                                                </mat-form-field>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6 col-lg-6 col-sm-0"></div>
                                </div>
                                <hr class="hr-highlight" />
                                <app-billingadress-and-docdetails-quote
                                [superUserDetails]="superUserDetails" ></app-billingadress-and-docdetails-quote>
                                <app-product-details-quote [superUserDetails]="superUserDetails"></app-product-details-quote>
                                <app-signature-and-additionaldetails-quote [superUserDetails]="superUserDetails" ></app-signature-and-additionaldetails-quote>
                                <hr />
                                <!-- Save Document -->
                                <div>
                                    <button type="submit" mat-raised-button color="primary" id="type-error"
                                        (click)="saveDocument()">
                                        <i class="ft-check-square mr-1"></i>Save Document
                                    </button>
                                    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                                    <button type="submit" mat-raised-button color="primary" (click)="backClick()">
                                        <i class="ft-check-square mr-1"></i>Back
                                    </button>
                                </div>
                                <br />
                            </div>
                        </mat-card>
                    </form>
                </div>
            </div>
        </section>
        <br>
    </div>
</div>
<mat-spinner  [diameter]="70" *ngIf="!quotationService.isLoaded"></mat-spinner>
