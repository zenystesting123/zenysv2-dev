<h2 mat-dialog-title>Update {{fieldNameContact}} {{statusFieldName}}</h2>
<mat-dialog-content class="mat-typography">
  <p> Confirm updation of {{fieldNameContact}} {{statusFieldName}} to {{statusName}}</p>

  <!-- reason for rejection field if status is changing to lost -->
  <mat-form-field class="full-width" appearance="fill"
    *ngIf="this.rejectionReasonDisplay === true && this.status === this.userStatusArray[this.userStatusArray.length - 1]?.stageId">
    <mat-label>Reason for rejection</mat-label>
    <mat-select [(ngModel)]="rejectionReasonValue" id="rejectionReasonValue" name="rejectionReasonValue"
      placeholder="Required">
      <mat-option *ngFor="let s of rejectionReasonArr" value="{{ s }}" [disabled]="!rejectionReasonArrPresent">{{
        s
        }}</mat-option>
    </mat-select>
  </mat-form-field>

</mat-dialog-content>
<mat-dialog-actions align="end">

  <button mat-button (click)="onCancel()" cdkFocusInitial>Cancel</button>
  <button mat-button color="primary"
    [disabled]="disableReAssign || !networkCheck.onNetworkCheck() || (!rejectionReasonValue && rejectionReasonMandatory && this.status === this.userStatusArray[this.userStatusArray.length - 1]?.stageId)"
    (click)="onSubmit()">Update </button>
</mat-dialog-actions>
