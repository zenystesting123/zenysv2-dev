<div class="no-v-scroll">
  <!-- TOOLBAR WEB -->
  <mat-toolbar
    style="position: sticky; top: 0; z-index: 10"
    class="mat-elevation-z2"
    [ngStyle]="{ 'background-color': 'white' }"
  >
    <button mat-icon-button title="back" (click)="onBack()">
      <mat-icon color="accent"> arrow_back </mat-icon>
    </button>
    <span> Employee List </span>
    <span class="example-spacer"></span>
    <!-- ADD ICON -->
    <button
      mat-mini-fab
      (click)="addEmployee()"
      color="accent"
      [disabled]="!networkCheck.onNetworkCheck()"
      mat-icon-button
      aria-aria-label="Add new item icon"
      title="Add Employee"
    >
      <mat-icon [ngStyle]="{ color: 'white' }">add</mat-icon>
    </button>
    &nbsp;&nbsp;&nbsp;
  </mat-toolbar>
  <!-- PROGRESS BAR -->
  <mat-progress-bar
    [style.visibility]="progressBarStatus ? 'hidden' : 'visible'"
    mode="indeterminate"
  >
  </mat-progress-bar>
  <div style="background-color: ghostwhite; overflow-y: auto; height: 100%">
    <div class="container-xl" style="margin-bottom: 60px">
      <br />
      <br />
      <br />
      <!-- search field -->
      <mat-form-field style="font-size: 15px; width: 100%" appearance="fill">
        <input
          matInput
          type="text"
          #query
          (keyup)="filter(query.value)"
          style="width: 100%"
          placeholder="Search by Employee Name or Employee ID"
        />
      </mat-form-field>
      <!-- table -->
      <div class="mat-elevation-z8">
        <table mat-table [dataSource]="dataSource" matSort>
          <!-- employeeID column -->
          <ng-container matColumnDef="employeeID">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              Employee ID
            </th>
            <td mat-cell *matCellDef="let row">
              {{ row.employeeID ? row.employeeID : "" }}
            </td>
          </ng-container>

          <!-- employee name Column -->
          <ng-container matColumnDef="employeeFirstName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              Employee Name
            </th>
            <td mat-cell *matCellDef="let row">
              {{ row.employeeFirstName }}&nbsp;{{ row.employeeSecondName }}
            </td>
          </ng-container>

          <!-- designation Column -->
          <ng-container matColumnDef="designation">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              Designation
            </th>
            <td mat-cell *matCellDef="let row">{{ row.designation }}</td>
          </ng-container>

          <!-- official email Column -->
          <ng-container matColumnDef="officialEmail">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              Official Email
            </th>
            <td mat-cell *matCellDef="let row">{{ row.officialEmail }}</td>
          </ng-container>

          <!-- contact number Column -->
          <ng-container matColumnDef="contactNo">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              Contact Number
            </th>
            <td mat-cell *matCellDef="let row">
              {{ row.code }} {{ row.contactNo }}
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns"
            (click)="rowSelected(row)"
          ></tr>

          <!-- Row shown when there is no matching data. -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="4">No records present!</td>
          </tr>
        </table>

        <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]"></mat-paginator>
      </div>
    </div>
  </div>
</div>
