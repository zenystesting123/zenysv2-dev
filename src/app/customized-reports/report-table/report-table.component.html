<div class="border" style="background-color: white;">
  <mat-toolbar  [ngStyle]="{'background-color':'white'}">
   <mat-form-field appearance="outline" style="font-size: 15px; width: 30%; height:80%;padding: 5px;" >
      <mat-label>Filter</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Type to filter table data" #input>
    </mat-form-field>
        <span class="example-spacer"></span>
          <button mat-icon-button color="accent"  aria-label="Table settings" title="Customise table" (click)="openDialog()">
            <mat-icon class="material-icons-outlined">settings</mat-icon>
          </button>
          <button mat-icon-button color="accent" aria-label="Download table" title="Download table" 
          (click) = "exporter.exportTable('csv',{fileName:reportSetting.title}) ">
            <mat-icon class="material-icons-outlined">download</mat-icon>
          </button>
      </mat-toolbar>

      <section class="example-container " tabindex="0">
        <br>
        <table mat-table [dataSource]="dataList" class="demo-table" matTableExporter   #exporter="matTableExporter" matSort>
          <ng-container *ngFor="let column of columns" [matColumnDef]="column.columnDef">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              {{column.header}}
            </th>
            <td mat-cell *matCellDef="let row" class="truncate-cell">
              {{findColumnValue(row,column)}}
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns; " (click)="onRowClick(row.id,row)"></tr>
                    <!-- Row shown when there is no matching data. -->
                    <tr class="mat-row" *matNoDataRow>
                      <td class="mat-cell" colspan="4">
                        No data to display
                      </td>
                    </tr>
        </table>
        <mat-paginator [pageSizeOptions]="[10, 20, 30]"
        aria-label="Select page">
      </mat-paginator>

        </section>
</div>
