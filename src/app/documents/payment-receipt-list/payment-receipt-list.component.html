<div class="no-v-scroll">
  <!-- TOOL BAR STARTS HERE -->
  <mat-toolbar *ngIf="!disableViewColl && commonService.userPlan.collectionsAccess" class="border-bottom" style="flex: 0 0 64px;z-index: 10"
    [ngStyle]="{'background-color':'white'}">
    <!--
    <button mat-icon-button title="back" (click)="onBack()">
      <mat-icon color="accent"> arrow_back </mat-icon>
    </button>
    -->

    <mat-icon class="text-primary" mat-list-icon>attach_money
    </mat-icon>&nbsp;
    <span class="text-primary-light">{{ fieldNameCollection }}s</span>

    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <mat-form-field appearance="outline" style="font-size: 14px; height:100%">
      <mat-label>View</mat-label>
      <mat-select placeholder="Select view" [(ngModel)]="viewSettingSelected" name="action">
        <mat-option *ngFor="let view of viewSettingArray, let i = index" [value]="view" (click)="viewChanged(i)">
          {{view.viewName}}
        </mat-option>
        <mat-divider> </mat-divider>
        <mat-option (click)="editView('Add')" [value]="0">
          <mat-icon>add</mat-icon>Add view
        </mat-option>

      </mat-select>
    </mat-form-field>
    &nbsp;
    <button mat-icon-button title="Edit view" (click)="editView('Edit')">
      <mat-icon class="material-icons-outlined" color="accent"> edit </mat-icon>
    </button>
     <!-- delete view -->
    <button mat-icon-button title="Delete view" (click)="deleteView()" *ngIf="viewSettingArray.length > 1">
      <mat-icon class="material-icons-outlined" color="warn"> delete </mat-icon>
    </button>
    <span class="example-spacer"></span>
    <button mat-mini-fab color="accent" mat-icon-button aria-aria-label="Create new {{fieldNameCollection}} icon"
      title="Create New {{fieldNameCollection}}" (click)="onCreatePayment()"
      [disabled]="!networkCheck.onNetworkCheck()" [ngClass]="{'isDisabled':disableCreateColl}">
      <mat-icon [ngStyle]="{'color':'white'}">add</mat-icon>
    </button>
  </mat-toolbar>
  <!-- END TOOL BAR HERE -->
  <!-- PROGRESS BAR -->
  <mat-progress-bar *ngIf="!isLoaded " mode="indeterminate">
  </mat-progress-bar>
  <div style="overflow-y: auto; height: 100%;" class="bg-soft-secondary">
    <!-- If Access is restricted -->
    <div *ngIf="disableViewColl || !commonService.userPlan.collectionsAccess" class="container" style="text-align: center;">
      <br>
      <h3>No Access</h3>
    </div>
    <br />
    <div *ngIf="commonService.userPlan.collectionsAccess" class="container-fluid" [style.display]="(isLoaded && !disableViewColl) ? 'block' : 'none' "
      style="margin-bottom: 30px;">
      <!-- IF UESR HAVE NO VIEW ACCESS -->

      <app-custom-report-table *ngIf="isLoaded" [userId]="userId" [columns]="columns" [dataList]="collectionList.data"
        [displayName]="displayName" [tableName]="tableName" [userIdsArray]="userIdsArray"
        [userNamesArray]="userNamesArray" [pipelineNames]="pipelineNames" [disableEdit]="disableEditColl"
        [tableDefaultData]="tableDefaultData" [fieldCustomsettings]="paymentSettings" [customFields]="customFields"
        [contactSettings]="contactSettings" [saleTitleSettings]="saleTitleSettings"
        [serviceTitleSettings]="serviceTitleSettings" [disableDownload]="disableCollDownload"></app-custom-report-table>
    </div>
  </div>
</div>
