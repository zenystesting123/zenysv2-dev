<div class="no-v-scroll">
  <!-- TOOL BAR STARTS HERE -->
  <mat-toolbar *ngIf="!disableDocView && commonService.userPlan.documentsAccess && commonService.userPlan.estimatesAccess" class="border-bottom" style="flex: 0 0 64px;z-index: 10"
    [ngStyle]="{'background-color':'white'}">
    <!--
    <button mat-icon-button title="back" (click)="onBack()">
      <mat-icon color="accent"> arrow_back </mat-icon>
    </button>
    -->

    <mat-icon mat-list-icon class="text-primary">article
    </mat-icon>&nbsp;
    <span class="text-primary-light">{{ fieldNameEstimate }}s</span>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <mat-form-field appearance="outline" style="font-size: 14px; height:100%">
      <mat-label>View</mat-label>
      <mat-select placeholder="Select view" [(ngModel)]="viewSettingSelected" name="action">
        <mat-option *ngFor="let view of viewSettingArray, let i = index" [value]="view" (click)="viewChanged(i)">
          {{view.viewName}}
        </mat-option>
        <mat-divider> </mat-divider>
        <mat-option (click)="editView('Add')" [value]="0">
          <mat-icon>add</mat-icon>Add view
        </mat-option>
      </mat-select>
    </mat-form-field>
    &nbsp;
    <button mat-icon-button title="Edit view" (click)="editView('Edit')">
      <mat-icon class="material-icons-outlined" color="accent"> edit </mat-icon>
    </button>
     <!-- delete view -->
    <button mat-icon-button title="Delete view" (click)="deleteView()" *ngIf="viewSettingArray.length > 1">
      <mat-icon class="material-icons-outlined" color="warn"> delete </mat-icon>
    </button>
    <span class="example-spacer"></span>
    <button [ngClass]="{'isDisabled':disableAddDocument}" mat-mini-fab color="accent" mat-icon-button
      aria-aria-label="Create new {{fieldNameEstimate}} icon" title="Create New {{fieldNameEstimate}}"
      (click)="onCreateEstimate()"
      [disabled]="!networkCheck.onNetworkCheck()|| commonService.addDocLimitaion.addEstimateDisable">
      <mat-icon [ngStyle]="{'color':'white'}">add</mat-icon>
    </button>
  </mat-toolbar>
  <!-- END TOOL BAR HERE -->
  <!-- PROGRESS BAR -->
  <mat-progress-bar *ngIf="!isLoaded " mode="indeterminate">
  </mat-progress-bar>
  <div style="overflow-y: auto; height: 100%;" class="bg-soft-secondary">
    <!-- IF UESR HAVE NO VIEW ACCESS -->
    <div *ngIf="disableDocView || !(commonService.userPlan.documentsAccess && commonService.userPlan.estimatesAccess)" class="container" style="text-align: center;">
      <br><br>
      <h3 style="text-align: center;">No Access</h3>
    </div>
    <div class="container-fluid"
    [style.display]="(isLoaded && !disableDocView && commonService.userPlan.documentsAccess && commonService.userPlan.estimatesAccess) ? 'block' : 'none' "
      style="margin-bottom: 30px;">
      <br />
      <!-- <div class="mat-elevation-z8"> -->
      <app-custom-report-table *ngIf="isLoaded" [userId]="userId" [columns]="columns" [dataList]="estimateList.data"
        [displayName]="displayName" [tableName]="tableName" [userIdsArray]="userIdsArray"
        [userNamesArray]="userNamesArray" [pipelineNames]="pipelineNames" [tableDefaultData]="tableDefaultData"
        [contactSettings]="contactSettings" [saleTitleSettings]="saleTitleSettings"
        [serviceTitleSettings]="serviceTitleSettings" [disableDownload]="disableDocDownload" [customFields]="customFields">
      </app-custom-report-table>
    </div>
  </div>
</div>
