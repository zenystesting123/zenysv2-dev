<h2 mat-dialog-title >Delete template</h2>

<mat-dialog-content class="mat-typography">
  <h3>Do you want to delete {{data.templateName}} template ? </h3>
</mat-dialog-content>

<mat-dialog-actions align="end">
<button mat-button (click)="onNoClick()">Cancel</button>
<button mat-button color="warn" [mat-dialog-close]="delete">Delete</button>
</mat-dialog-actions>
