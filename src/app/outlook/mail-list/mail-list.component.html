
<div class="container">
  <!--This is to avoid reload during acquireTokenSilent() because of hidden iframe -->
  <router-outlet *ngIf="!isIframe"></router-outlet>
</div>
<!-- Login button -->
<div *ngIf="connectoutlookdisp">
  <div class="row" style="margin:0px">
    <div class="d-flex justify-content-center"
      style="background-color: ghostwhite;height:95%;text-align: center;border-radius: 10px;">

      <div class="d-flex flex-column">


        <div class="p-1 bd-highlight">
          <img src="https://img.icons8.com/color/48/null/ms-outlook.png" title="Connect your google account" />
        </div>

        <div class="p-2">
          <div>
            <button mat-stroked-button color="primary" title="Connect your Outlook" (click)="login()" href="#"
              onClick="return false;">
              Sign in
            </button>
          </div>
        </div>

        <!-- <div class="p-2">
          <span class="caption" style="color:gray">
            Connect your Microsoft Outlook account to send emails
          </span>
        </div> -->
      </div>
      <br>
    </div>
  </div>
</div>
<!-- Mail list -->
<div *ngIf="hideTab0Flag&&!connectoutlookdisp">
  <div class="container-fluid"
    style="background-color: white;border:10px;margin-top: 15px; height:70vh; overflow-y: scroll;">
    <br>
    <div style="float:right">
      <!-- Refresh button -->
      <button mat-icon-button *ngIf="!dataSource2.length==0 || !mailexist" (click)="getemails()" title="Check emails">
        <mat-icon color="accent" class="material-icons-outlined">refresh</mat-icon>
      </button>
      <!-- New message -->
      <button mat-icon-button (click)="sendemailpopup()" title="Compose a new email">
        <mat-icon color="accent" class="material-icons-outlined">email</mat-icon>
      </button>
      <!-- Logout button -->
      <button mat-icon-button (click)="logout()" title="Logout">
        <mat-icon color="accent" class="material-icons-outlined">logout</mat-icon>
      </button>
    </div>
    <!-- New message count -->
    <div><span class="text-info">{{totalunread==0?'No new emails':'Unread Emails:'+totalunread}}</span></div>
    <br>
    <br>
    <!-- Spinner -->
    <div class="container-fluid spinner">
      <mat-spinner *ngIf="dataSource2.length==0 && mailexist" color="primary" [diameter]=24></mat-spinner>
    </div>
    <!-- Table starts here -->
    <table mat-table *ngIf="!dataSource2.length==0 || !mailexist" [dataSource]="dataSource2" class="border">
      <!-- To address -->
      <ng-container matColumnDef="To">
        <th mat-header-cell *matHeaderCellDef> To </th>
        <td mat-cell *matCellDef="let element"> {{element.to}} </td>
      </ng-container>
      <!-- Subject -->
      <ng-container matColumnDef="Subject">
        <th mat-header-cell *matHeaderCellDef> Subject </th>
        <td mat-cell *matCellDef="let element"> {{element.subject}} </td>
      </ng-container>
      <!-- Body -->
      <ng-container matColumnDef="Body">
        <th mat-header-cell *matHeaderCellDef> Body </th>
        <td mat-cell *matCellDef="let element"> {{element.data.substring(0, 20)}} </td>
      </ng-container>
      <!-- Date -->
      <ng-container matColumnDef="Date">
        <th mat-header-cell *matHeaderCellDef> Date </th>
        <td mat-cell *matCellDef="let element"> {{element.date | date:'d/M/yy, h:mm a'}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns2"></tr>
      <tr mat-row *matRowDef="let element;let i = index; columns: displayedColumns2;"
        [ngClass]="{'highlight': element.msgtoread == true}"
        (click)="openemail(element.id, element.threadId, element.messageHistory, element.loggedInUser)"></tr> 


      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No emails present</td>
      </tr>

    </table>
  </div>

</div>

<div *ngIf="!hideTab0Flag&&!connectoutlookdisp" class="container-fluid"
  style="background-color: white;border:10px;margin-top: 15px; height:70vh; overflow-y: scroll;">
  <button mat-icon-button color="primary" (click)="this.hideTab0Flag=true">
    <mat-icon class="example-tab-icon" color="accent" title="Back to email list">arrow_back</mat-icon>
  </button>
  <!-- Show message -->
  <app-show-mailthread [data]="passtomail"></app-show-mailthread>
</div>
