
<div class="messages-box">
    <div class="list-group rounded-0">
      
    <div *ngFor="let chathead of chatHeads;i as index">
      <div   (click)="chatHeadClicked(chathead.zenysUser)"  class="list-group-item list-group-item-action thelist rounded-0 " >
        <div class="media" style="width: 100%;">
            <mat-icon matListAvatar class="rounded-circle" style="margin-top:auto;margin-bottom: auto;">
                <ngx-avatar name="{{(chathead.zenysUser).split(' ')[0]}}" size="35" textSizeRatio="1.5"></ngx-avatar>
            </mat-icon>
            <!-- <img src="https://res.cloudinary.com/mhmd/image/upload/v1564960395/avatar_usae7z.svg" alt="user" width="50" class="rounded-circle"> -->
          <div class="media-body ml-4">
            <div class="d-flex align-items-center justify-content-between mb-1">
              <h6 class="mb-0">
                {{chathead.zenysUser}}
              </h6><small class="small font-weight-bold">{{chathead.timestamp|date}}</small>
            </div>
            <p class="font-italic text-muted mb-0 text-small">{{chathead.message}}</p>
          </div>
        </div>
      </div>
    </div>
